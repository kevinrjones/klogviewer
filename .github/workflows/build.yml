name: CI/CD Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-suffix: linux
            package-task: packageDeb
            dist-path: app/build/compose/binaries/main/app
            installer-path: app/build/compose/binaries/main/deb/*.deb
          - os: windows-latest
            artifact-suffix: windows
            package-task: packageMsi
            dist-path: app/build/compose/binaries/main/app
            installer-path: app/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            artifact-suffix: macos
            package-task: packageDmg
            dist-path: app/build/compose/binaries/main/app
            installer-path: app/build/compose/binaries/main/dmg/*.dmg

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Tests
      run: ./gradlew test

    - name: Package Installer
      run: ./gradlew :app:${{ matrix.package-task }}

    - name: Create Distributable (Plain Executable)
      run: ./gradlew :app:createDistributable

    - name: Prepare Artifacts (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p release-artifacts
        cp ${{ matrix.installer-path }} release-artifacts/
        cd ${{ matrix.dist-path }} && zip -r $GITHUB_WORKSPACE/release-artifacts/KLogViewer-${{ matrix.artifact-suffix }}-executable.zip .

    - name: Prepare Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path release-artifacts
        Copy-Item -Path ${{ matrix.installer-path }} -Destination release-artifacts/
        Compress-Archive -Path ${{ matrix.dist-path }}/* -DestinationPath release-artifacts/KLogViewer-${{ matrix.artifact-suffix }}-executable.zip

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: KLogViewer-${{ matrix.artifact-suffix }}
        path: release-artifacts/*
